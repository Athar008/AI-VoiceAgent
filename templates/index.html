<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Voice Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d10;
      --surface: #16161c;
      --surface2: #1e1e26;
      --border: #2a2a38;
      --border2: #3a3a4a;
      --text: #e8e8f0;
      --muted: #7a7a90;
      --accent: #7c6af7;
      --accent-dim: #2d2850;
      --accent-text: #c4bcff;
      --green: #4ade80;
      --green-dim: #0f2d1a;
      --red: #f87171;
      --red-dim: #2d0f0f;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }
    .logo-dot.speaking { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn-icon {
      width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
    }
    .btn-icon:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .msg { display: flex; gap: 10px; max-width: 78%; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai   { align-self: flex-start; }

    .avatar {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
      letter-spacing: 0.5px;
    }
    .msg.user .avatar { background: var(--accent-dim); color: var(--accent-text); }
    .msg.ai   .avatar { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    .bubble {
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      max-width: 100%;
    }
    .msg.user .bubble {
      background: var(--accent-dim);
      color: var(--accent-text);
      border: 1px solid var(--accent);
      border-radius: 14px 14px 4px 14px;
    }
    .msg.ai .bubble {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px 14px 14px 4px;
    }

    .typing-dots span {
      display: inline-block; width: 5px; height: 5px;
      border-radius: 50%; background: var(--muted); margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* Voice settings panel */
    #voice-panel {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .voice-field { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .voice-field select, .voice-field input[type=range] { font-size: 12px; }
    select {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 8px; font-size: 12px; max-width: 180px;
    }

    /* Input row */
    #input-row {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      padding: 10px 16px;
      font-size: 14px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.15s;
      resize: none;
      height: 42px;
      font-family: inherit;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }

    .btn-action {
      width: 42px; height: 42px; border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-action:hover { background: var(--surface); border-color: var(--border2); color: var(--text); }
    #send-btn { background: var(--accent-dim); border-color: var(--accent); color: var(--accent-text); }
    #send-btn:hover { background: var(--accent); color: #fff; }
    #mic-btn.listening { background: var(--red-dim); border-color: var(--red); color: var(--red); animation: pulse 1s infinite; }

    /* Status bar */
    #status {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 4px 0;
      background: var(--surface);
      flex-shrink: 0;
      min-height: 22px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot" id="logo-dot"></div>
    AI Voice Chatbot
  </div>
<div class="header-actions">
    <button class="btn-icon" id="voice-toggle" title="Voice on/off">🔊</button>
    <button class="btn-icon" id="stop-btn" title="Stop speaking">⏹</button>
    <button class="btn-icon" id="clear-btn" title="Clear chat">🗑</button>
</div>
</header>

<div id="chat">
  <div class="msg ai">
    <div class="avatar">AI</div>
    <div class="bubble">Hi! I'm your AI assistant. Type a message or use the mic, and I'll reply and speak to you. 🎙️</div>
  </div>
</div>

<div id="voice-panel">
  <div class="voice-field">
    <span>🔊 Voice</span>
    <select id="voice-select"></select>
  </div>
  <div class="voice-field">
    <span>Speed</span>
    <input type="range" id="rate-slider" min="0.5" max="2" step="0.1" value="1" style="width:80px"/>
    <span id="rate-val">1.0×</span>
  </div>
  <div class="voice-field">
    <span>Pitch</span>
    <input type="range" id="pitch-slider" min="0.5" max="2" step="0.1" value="1" style="width:70px"/>
  </div>
</div>

<div id="status"></div>

<div id="input-row">
  <textarea id="msg-input" placeholder="Type your message..." rows="1"></textarea>
  <button class="btn-action" id="mic-btn" title="Voice input">🎙️</button>
  <button class="btn-action" id="send-btn" title="Send">➤</button>
</div>

<script>
  const chat       = document.getElementById('chat');
  const msgInput   = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');
  const micBtn     = document.getElementById('mic-btn');
  const stopBtn    = document.getElementById('stop-btn');
  const clearBtn   = document.getElementById('clear-btn');
  const voiceSel   = document.getElementById('voice-select');
  const rateSlider = document.getElementById('rate-slider');
  const rateVal    = document.getElementById('rate-val');
  const pitchSlider= document.getElementById('pitch-slider');
  const statusEl   = document.getElementById('status');
  const logoDot    = document.getElementById('logo-dot');

  const synth = window.speechSynthesis;
  let voices = [], isListening = false, recognition = null;

  // Load voices
  function loadVoices() {
    voices = synth.getVoices();
    voiceSel.innerHTML = '';
    voices.forEach((v, i) => {
      const o = document.createElement('option');
      o.value = i;
      o.textContent = v.name + (v.localService ? ' ✓' : '');
      voiceSel.appendChild(o);
    });
    const def = voices.findIndex(v => v.lang.startsWith('en') && v.localService);
    if (def >= 0) voiceSel.value = def;
  }
  loadVoices();
  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

  rateSlider.addEventListener('input', () => { rateVal.textContent = parseFloat(rateSlider.value).toFixed(1) + '×'; });

  // Speech synthesis
  function speak(text) {
    if (!voiceEnabled) return;
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    const v = voices[parseInt(voiceSel.value)];
    if (v) utt.voice = v;
    utt.rate  = parseFloat(rateSlider.value);
    utt.pitch = parseFloat(pitchSlider.value);
    utt.onstart = () => { setStatus('🔊 Speaking...'); logoDot.classList.add('speaking'); };
    utt.onend   = () => { setStatus(''); logoDot.classList.remove('speaking'); };
    utt.onerror = () => { setStatus(''); logoDot.classList.remove('speaking'); };
    synth.speak(utt);
  }

  stopBtn.addEventListener('click', () => { synth.cancel(); setStatus(''); logoDot.classList.remove('speaking'); });

let voiceEnabled = true;
const voiceToggle = document.getElementById('voice-toggle');
voiceToggle.addEventListener('click', () => {
    voiceEnabled = !voiceEnabled;
    voiceToggle.textContent = voiceEnabled ? '🔊' : '🔇';
    voiceToggle.style.opacity = voiceEnabled ? '1' : '0.4';
    if (!voiceEnabled) { synth.cancel(); setStatus(''); logoDot.classList.remove('speaking'); }
});

  // Helpers
  function setStatus(msg) { statusEl.textContent = msg; }

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
    div.innerHTML = `<div class="avatar">${role === 'user' ? 'You' : 'AI'}</div><div class="bubble">${escapeHtml(text)}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg ai'; div.id = 'typing';
    div.innerHTML = '<div class="avatar">AI</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }
  function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

  // Send message to Flask backend
  async function sendMessage(text) {
    text = text.trim();
    if (!text) return;
    addMsg('user', text);
    msgInput.value = '';
    msgInput.style.height = '42px';
    addTyping();
    setStatus('Thinking...');
    sendBtn.disabled = true;

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      removeTyping();

      if (data.error) {
        setStatus('⚠️ Error: ' + data.error);
        sendBtn.disabled = false;
        return;
      }

      addMsg('ai', data.reply);
      speak(data.reply);
    } catch (e) {
      removeTyping();
      setStatus('⚠️ Could not reach server. Is Flask running?');
    }
    sendBtn.disabled = false;
  }

  sendBtn.addEventListener('click', () => sendMessage(msgInput.value));
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(msgInput.value); }
  });

  // Clear chat
  clearBtn.addEventListener('click', async () => {
    chat.innerHTML = '<div class="msg ai"><div class="avatar">AI</div><div class="bubble">Chat cleared. How can I help?</div></div>';
    await fetch('/clear', { method: 'POST' });
  });

  // Mic / Speech Recognition
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';
    recognition.onresult = e => { sendMessage(e.results[0][0].transcript); };
    recognition.onend  = () => { isListening = false; micBtn.classList.remove('listening'); setStatus(''); };
    recognition.onerror = () => { isListening = false; micBtn.classList.remove('listening'); setStatus('Mic error — allow microphone access.'); };
    micBtn.addEventListener('click', () => {
      if (!isListening) { recognition.start(); isListening = true; micBtn.classList.add('listening'); setStatus('🎙️ Listening...'); }
      else recognition.stop();
    });
  } else {
    micBtn.disabled = true;
    micBtn.title = 'Not supported — use Chrome or Edge';
  }
</script>
</body>
</html>
